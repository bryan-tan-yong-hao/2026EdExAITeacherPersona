<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Teacher Persona Quiz</title>
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --bg: #f5f3ff;
            --card: #ffffff;
            --text: #1e1b4b;
            --text-light: #6366f1;
            --accent: #eef2ff;
            --border: #e0e7ff;
            --success: #10b981;
        }
        
        body { 
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            display: flex; 
            justify-content: center; 
            padding: 20px; 
            line-height: 1.6;
            min-height: 100vh;
            margin: 0;
            position: relative;
        }

        /* Fixed Logo Header - Top Left and Top Right */
        .header-logos {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 30px;
            z-index: 100;
            background: rgba(245, 243, 255, 0.8);
            backdrop-filter: blur(8px);
        }

        .header-logos img {
            height: 45px;
            width: auto;
            object-fit: contain;
        }

        #quiz-app { 
            background: var(--card); 
            max-width: 700px; 
            width: 100%; 
            padding: 48px; 
            border-radius: 24px; 
            box-shadow: 0 20px 25px -5px rgba(99, 102, 241, 0.1); 
            margin-top: 100px; 
            margin-bottom: 50px;
            border: 1px solid var(--border);
            position: relative;
            z-index: 1;
        }

        .hidden { display: none; }

        h1 { font-size: 2.25rem; margin-bottom: 12px; color: var(--text); text-align: center; font-weight: 800; }
        .intro-text { text-align: center; font-size: 1.125rem; color: #4338ca; margin-bottom: 30px; }

        /* FIRST PAGE EVENT DETAILS */
        .event-info {
            margin-top: 40px;
            padding-top: 30px;
            border-top: 1px solid var(--border);
            text-align: center;
        }
        
        /* The Event Title Image Placeholder */
        .event-title-img {
            max-width: 90%;
            height: auto;
            margin: 0 auto 20px auto;
            display: block;
            border-radius: 8px;
        }

        .event-meta {
            font-weight: 700;
            color: var(--text-light);
            font-size: 1.2rem;
            letter-spacing: 0.02em;
        }

        /* Quiz Components */
        .progress { 
            font-size: 0.75rem; 
            color: var(--primary); 
            text-align: center; 
            font-weight: 800; 
            text-transform: uppercase; 
            background: var(--accent);
            padding: 4px 12px;
            border-radius: 20px;
            width: fit-content;
            margin: 0 auto 24px auto;
        }

        .question-text { font-size: 1.5rem; font-weight: 700; margin-bottom: 32px; text-align: center; }
        .options { display: flex; flex-direction: column; gap: 12px; }
        .option-btn { 
            background: #fff; 
            border: 2px solid var(--border); 
            padding: 18px 24px; 
            border-radius: 16px; 
            cursor: pointer; 
            text-align: left; 
            transition: 0.2s; 
            font-size: 1rem;
            font-weight: 500;
        }
        .option-btn:hover { border-color: var(--primary); background: #f5f3ff; }

        /* RESULTS PAGE - CENTRALIZED IMAGE */
        #persona-visual-container { 
            width: 100%; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            margin-bottom: 32px; 
            background: #faf5ff; 
            padding: 20px; 
            border-radius: 20px;
            border: 1px solid var(--border);
            min-height: 350px;
            overflow: hidden;
        }

        .persona-img { 
            max-width: 100%; 
            height: auto; 
            max-height: 400px;
            border-radius: 12px; 
            display: none; /* Shown via JS when loaded */
            margin: 0 auto; 
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        .persona-title { font-size: 3rem; text-align: center; font-weight: 900; margin-bottom: 10px; }

        .superpower { 
            background: linear-gradient(135deg, #f5f3ff 0%, #e0e7ff 100%); 
            padding: 24px; 
            margin: 32px 0; 
            border-radius: 16px; 
            border: 1px solid var(--border);
        }

        .use-case-list { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 0; list-style: none; }
        .use-case-list li { 
            background: #f5f3ff; 
            padding: 12px; 
            border-radius: 12px; 
            font-weight: 600; 
            font-size: 0.9rem;
            display: flex;
            align-items: center;
        }
        .use-case-list li::before { content: "✓"; color: var(--success); margin-right: 8px; font-weight: 900; }

        button.action-btn { 
            background: var(--primary); 
            color: white; 
            border: none; 
            padding: 18px; 
            border-radius: 16px; 
            cursor: pointer; 
            font-weight: 700; 
            width: 100%; 
            font-size: 1.1rem;
            transition: 0.3s;
        }
        button.action-btn:hover { background: var(--primary-dark); transform: translateY(-2px); }
        
        @media (max-width: 600px) {
            #quiz-app { padding: 24px; }
            .use-case-list { grid-template-columns: 1fr; }
            .header-logos { padding: 10px; }
            .header-logos img { height: 35px; }
        }
    </style>
</head>
<body>

<div class="header-logos">
    <img src="ed_ex_logo.png" alt="Event Logo" onerror="this.src='https://placehold.co/100x50?text=Event+Logo'">
    <img src="etd.png" alt="ETD Logo" onerror="this.src='https://placehold.co/100x50?text=ETD+Logo'">
</div>

<div id="quiz-app">
    <!-- Landing Page -->
    <div id="intro">
        <h1>AI Teacher Persona Quiz</h1>
        <p class="intro-text">Discover how you leverage AI to enhance teaching and learning in your classroom.</p>
        
        <button class="action-btn" onclick="startQuiz()">Begin Journey</button>

        <!-- EVENT TITLE PLACEHOLDER -->
        <div class="event-info">
            <img src="event_title.png" alt="Event Title" class="event-title-img" onerror="this.style.display='none'">
            <div class="event-meta">
                15 July 2024<br>
                09:00 AM - 05:00 PM
            </div>
        </div>
    </div>

    <!-- Quiz Section -->
    <div id="quiz" class="hidden">
        <div class="progress" id="progress">Question 1 of 6</div>
        <div class="question-text" id="question"></div>
        <div class="options" id="options"></div>
    </div>

    <!-- Result Section -->
    <div id="result" class="hidden">
        <div class="result-card">
            <div style="text-align: center; text-transform: uppercase; font-weight: 800; color: var(--primary); letter-spacing: 1px; margin-bottom: 10px;">Results</div>
            
            <div id="persona-visual-container">
                <div id="img-loader">Visual loading...</div>
                <img id="persona-img" src="" alt="Persona Visual" class="persona-img">
            </div>

            <h2 style="text-align:center; margin:0; font-weight:500;">You are the</h2>
            <div class="persona-title" id="persona-display"></div>
            <p id="persona-desc" style="text-align:center; color:#4338ca; margin-bottom:30px;"></p>
            
            <div class="superpower">
                <strong style="display:block; font-size:0.75rem; text-transform:uppercase; color:var(--primary); margin-bottom:5px;">Your Superpower</strong>
                <span id="persona-superpower"></span>
            </div>

            <h3 style="border-bottom: 1px solid var(--border); padding-bottom:10px; margin-bottom:20px;">Your AI Leadership Style</h3>
            <ul class="use-case-list" id="persona-use-cases"></ul>
            
            <button class="action-btn" style="margin-top:30px;" onclick="location.reload()">Restart Quiz</button>
        </div>

        <div style="margin-top:40px; border-top: 1px solid var(--border); padding-top:20px;">
            <h3>Summary of Choices</h3>
            <div id="summary-content"></div>
        </div>
    </div>
</div>

<script>
    const quizData = [
        {
            q: "When you start planning a lesson using AI, what do you usually do?",
            options: [
                { text: "I start by crafting a good prompt to help AI generate ideas for my lesson.", persona: "Prompt Whisperer" },
                { text: "I ask AI to generate worksheets, examples, or teaching materials for the topic.", persona: "Content Alchemist" },
                { text: "I think about how students themselves could interact with AI during the lesson.", persona: "Classroom Conductor" },
                { text: "I look at past student mistakes and ask AI how I could address those misconceptions.", persona: "Feedback Detective" },
                { text: "I reflect on how my previous lesson went and ask AI how it could be improved.", persona: "Lesson Hacker" }
            ]
        },
        {
            q: "You discover a new AI tool designed for education. What is the first thing you want to try?",
            options: [
                { text: "Experiment with different prompts to see what kind of responses the AI gives.", persona: "Prompt Whisperer" },
                { text: "Use it to quickly generate resources like quizzes or case studies.", persona: "Content Alchemist" },
                { text: "Design an activity where students can use the AI to explore ideas.", persona: "Classroom Conductor" },
                { text: "See whether it can help analyse student responses or give feedback.", persona: "Feedback Detective" },
                { text: "Ask it to help improve or redesign one of my existing lessons.", persona: "Lesson Hacker" }
            ]
        },
        {
            q: "During a lesson, students seem stuck on a difficult concept. How might AI help?",
            options: [
                { text: "I try different prompts to see if AI can come up with a clearer explanation.", persona: "Prompt Whisperer" },
                { text: "I ask AI to produce a quick practice question or example explainer media for students.", persona: "Content Alchemist" },
                { text: "I let students ask the AI questions to help them explore the concept further.", persona: "Classroom Conductor" },
                { text: "I ask AI to help identify the misconception students might have.", persona: "Feedback Detective" },
                { text: "I later use AI to redesign my lesson to teach this concept again.", persona: "Lesson Hacker" }
            ]
        },
        {
            q: "After students submit their work, how are you most likely to use AI?",
            options: [
                { text: "I prompt AI to ask what I can do with my students’ work to give them better feedback.", persona: "Prompt Whisperer" },
                { text: "I use AI to help generate additional practice questions for students.", persona: "Content Alchemist" },
                { text: "I design a follow-up activity where students can discuss their answers with AI.", persona: "Classroom Conductor" },
                { text: "I use AI to help analyse patterns in student responses.", persona: "Feedback Detective" },
                { text: "I use AI to reflect on the lesson and think about improvements.", persona: "Lesson Hacker" }
            ]
        },
        {
            q: "When colleagues talk about using AI in teaching, which idea excites you most?",
            options: [
                { text: "Learning how to write better prompts to get more useful responses.", persona: "Prompt Whisperer" },
                { text: "Using AI to create high-quality teaching materials quickly.", persona: "Content Alchemist" },
                { text: "Finding ways for students to use AI to support their own learning.", persona: "Classroom Conductor" },
                { text: "Using AI to better understand student learning and give feedback.", persona: "Feedback Detective" },
                { text: "Using AI to help refine and improve lesson design over time.", persona: "Lesson Hacker" }
            ]
        },
        {
            q: "If you had 10 minutes to experiment with AI before your next lesson, what would you most likely do?",
            options: [
                { text: "Try different prompts to see which ones produce the best teaching ideas.", persona: "Prompt Whisperer" },
                { text: "Generate a worksheet, example set, or activity for the lesson.", persona: "Content Alchemist" },
                { text: "Create a short activity where students can explore a topic with AI.", persona: "Classroom Conductor" },
                { text: "Analyse sample student answers with AI to identify misconceptions.", persona: "Feedback Detective" },
                { text: "Ask AI to review my lesson plan and suggest improvements.", persona: "Lesson Hacker" }
            ]
        }
    ];

    const personaDetails = {
        "Prompt Whisperer": {
            image: "the_prompt_whisperer.jpg",
            desc: "You know that good AI output often starts with a good prompt. You use AI as a thinking partner to brainstorm and sharpen ideas.",
            superpower: "Turning simple prompts into powerful teaching ideas.",
            useCases: ["Refining explanations", "Brainstorming starts", "Question stems", "Drafting content"]
        },
        "Content Alchemist": {
            image: "the_content_alchemist.jpg",
            desc: "You turn ideas into ready-to-use materials. You use AI to generate worksheets, examples, and tasks that bring content to life.",
            superpower: "Transforming ideas into practical classroom resources.",
            useCases: ["Worksheet generation", "Explainer media", "Adapting text levels", "Resource design"]
        },
        "Classroom Conductor": {
            image: "the_classroom_conductor.jpg",
            desc: "You bring AI into the student experience. You design opportunities for students to interact with AI directly.",
            superpower: "Orchestrating meaningful student-AI interactions.",
            useCases: ["Student inquiries", "AI-facilitated debates", "Interactive tutoring", "Concept exploration"]
        },
        "Feedback Detective": {
            image: "the_feedback_detective.jpg",
            desc: "You use AI to uncover insights about student learning. You look for patterns and identify misconceptions.",
            superpower: "Turning data into actionable learning insights.",
            useCases: ["Misconception mapping", "Exit ticket analysis", "Grouping students", "Personalised feedback"]
        },
        "Lesson Hacker": {
            image: "the_lesson_hacker.jpg",
            desc: "You are constantly refining your practice. You use AI to reflect on lessons and iterate on your design.",
            superpower: "Continuous pedagogical improvement through AI.",
            useCases: ["Lesson redesign", "Reflection support", "Concept redesign", "Strategy auditing"]
        }
    };

    let currentQuestion = 0;
    let scores = {};
    let userAnswers = [];

    function startQuiz() {
        document.getElementById('intro').classList.add('hidden');
        document.getElementById('quiz').classList.remove('hidden');
        showQuestion();
    }

    function showQuestion() {
        const q = quizData[currentQuestion];
        document.getElementById('progress').innerText = `Question ${currentQuestion + 1} of ${quizData.length}`;
        document.getElementById('question').innerText = q.q;
        const optionsDiv = document.getElementById('options');
        optionsDiv.innerHTML = '';
        q.options.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opt.text;
            btn.onclick = () => handleAnswer(opt.persona, opt.text);
            optionsDiv.appendChild(btn);
        });
    }

    function handleAnswer(persona, text) {
        scores[persona] = (scores[persona] || 0) + 1;
        userAnswers.push({ q: quizData[currentQuestion].q, a: text });
        currentQuestion++;
        if (currentQuestion < quizData.length) {
            showQuestion();
        } else {
            showResult();
        }
    }

    function showResult() {
        document.getElementById('quiz').classList.add('hidden');
        document.getElementById('result').classList.remove('hidden');
        
        const winner = Object.keys(scores).sort((a, b) => scores[b] - scores[a])[0];
        const details = personaDetails[winner];

        const imgElement = document.getElementById('persona-img');
        imgElement.src = details.image;
        imgElement.onload = () => {
            document.getElementById('img-loader').style.display = 'none';
            imgElement.style.display = 'block';
        };
        imgElement.onerror = () => {
            document.getElementById('img-loader').innerText = "Visual: " + winner;
            document.getElementById('img-loader').style.fontSize = "1.5rem";
            document.getElementById('img-loader').style.fontWeight = "800";
        };

        document.getElementById('persona-display').innerText = winner;
        document.getElementById('persona-desc').innerText = details.desc;
        document.getElementById('persona-superpower').innerText = details.superpower;

        const useCasesUl = document.getElementById('persona-use-cases');
        useCasesUl.innerHTML = '';
        details.useCases.forEach(uc => {
            const li = document.createElement('li');
            li.innerText = uc;
            useCasesUl.appendChild(li);
        });

        const summaryDiv = document.getElementById('summary-content');
        summaryDiv.innerHTML = '';
        userAnswers.forEach((ans, index) => {
            const item = document.createElement('div');
            item.style.marginBottom = '10px';
            item.style.fontSize = '0.85rem';
            item.innerHTML = `<strong>Q${index+1}:</strong> ${ans.a}`;
            summaryDiv.appendChild(item);
        });
        
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }
</script>
</body>
</html>
