<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Teacher Persona Quiz</title>
    <style>
        :root {
            --primary: #2563eb;
            --primary-dark: #1e40af;
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #0f172a;
            --text-light: #64748b;
            --accent: #dbeafe;
            --border: #e2e8f0;
            --success: #10b981;
        }
        
        body { 
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            display: flex; 
            justify-content: center; 
            padding: 40px 20px; 
            line-height: 1.6;
            min-height: 100vh;
            margin: 0;
        }

        #quiz-app { 
            background: var(--card); 
            max-width: 700px; 
            width: 100%; 
            padding: 48px; 
            border-radius: 24px; 
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05), 0 10px 10px -5px rgba(0, 0, 0, 0.02); 
            margin-bottom: 50px;
            border: 1px solid var(--border);
        }

        .hidden { display: none; }

        h1 { font-size: 2.25rem; margin-bottom: 12px; color: var(--text); text-align: center; font-weight: 800; letter-spacing: -0.025em; }
        
        .intro-text { text-align: center; font-size: 1.125rem; color: var(--text-light); margin-bottom: 40px; max-width: 500px; margin-left: auto; margin-right: auto; }

        h2 { text-align: center; color: var(--text); font-size: 1.5rem; font-weight: 700; margin-top: 0; margin-bottom: 24px; }
        
        /* Specific request: Bold Results Title */
        .results-header { 
            font-weight: 900; 
            text-transform: uppercase; 
            letter-spacing: 0.05em; 
            color: var(--primary); 
            font-size: 1.1rem; 
            display: block; 
            text-align: center;
            margin-bottom: 8px;
        }

        h3 { color: var(--text); border-bottom: 2px solid var(--accent); padding-bottom: 12px; margin-top: 40px; font-size: 1.25rem; font-weight: 700; }

        .progress { 
            font-size: 0.75rem; 
            color: var(--primary); 
            margin-bottom: 24px; 
            text-align: center; 
            font-weight: 800; 
            text-transform: uppercase; 
            letter-spacing: 0.1em;
            background: var(--accent);
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            width: fit-content;
            margin-left: auto;
            margin-right: auto;
            display: block;
        }

        .question-text { font-size: 1.5rem; font-weight: 700; margin-bottom: 32px; color: var(--text); text-align: center; line-height: 1.3; }

        .options { display: flex; flex-direction: column; gap: 16px; }

        .option-btn { 
            background: #fff; 
            border: 2px solid var(--border); 
            padding: 20px 24px; 
            border-radius: 16px; 
            cursor: pointer; 
            text-align: left; 
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); 
            font-size: 1.05rem; 
            color: var(--text); 
            font-weight: 500;
        }

        .option-btn:hover { 
            border-color: var(--primary); 
            background: #f0f7ff; 
            transform: scale(1.02);
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.1);
        }

        .result-card { text-align: left; animation: fadeIn 0.8s ease-out; }
        
        #persona-visual-container { 
            width: 100%; 
            display: flex; 
            flex-direction: column;
            justify-content: center; 
            margin-bottom: 32px; 
            background: #f8fafc; 
            padding: 16px; 
            border-radius: 20px;
            border: 1px solid var(--border);
            overflow: hidden;
            min-height: 350px;
            align-items: center;
            position: relative;
        }

        .persona-img { 
            max-width: 100%; 
            height: auto; 
            max-height: 450px; 
            border-radius: 12px;
            object-fit: contain;
            display: none;
            transition: opacity 0.5s ease;
        }

        .img-status { color: var(--text-light); font-size: 0.875rem; text-align: center; font-style: italic; }

        .persona-title { 
            font-size: 3rem; 
            color: var(--text); 
            margin: 10px 0; 
            text-align: center; 
            font-weight: 900; 
            letter-spacing: -0.04em; 
            line-height: 1;
        }

        .superpower { 
            background: linear-gradient(135deg, #eff6ff 0%, #dbeafe 100%); 
            padding: 24px; 
            margin: 32px 0; 
            border-radius: 16px; 
            font-size: 1.125rem;
            border: 1px solid var(--accent);
        }

        .superpower strong { 
            color: var(--primary); 
            display: block; 
            text-transform: uppercase; 
            font-size: 0.75rem; 
            letter-spacing: 0.1em; 
            margin-bottom: 8px; 
            font-weight: 800;
        }

        .use-case-list { margin: 20px 0; padding: 0; display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .use-case-list li { 
            margin: 0; 
            list-style-type: none; 
            padding: 12px 16px; 
            background: #f1f5f9;
            border-radius: 12px;
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text);
            display: flex;
            align-items: center;
        }
        .use-case-list li::before { content: "✓"; margin-right: 10px; color: var(--success); font-weight: 900; }

        .summary-section { margin-top: 60px; border-top: 2px solid var(--border); padding-top: 40px; }
        .summary-item { margin-bottom: 16px; font-size: 0.9rem; background: var(--bg); padding: 20px; border-radius: 16px; border: 1px solid var(--border); }
        .summary-q { font-weight: 700; display: block; margin-bottom: 8px; color: var(--text); }
        .summary-a { color: var(--primary); font-weight: 600; }

        button.restart { 
            margin-top: 32px; 
            background: var(--primary); 
            color: white; 
            border: none; 
            padding: 18px 32px; 
            border-radius: 16px; 
            cursor: pointer; 
            font-weight: 700; 
            width: 100%; 
            font-size: 1.125rem; 
            transition: all 0.3s;
            box-shadow: 0 4px 6px -1px rgba(37, 99, 235, 0.2);
        }

        button.restart:hover { 
            background: var(--primary-dark); 
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.3);
        }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        @media (max-width: 600px) {
            #quiz-app { padding: 24px; }
            .persona-title { font-size: 2.25rem; }
            .use-case-list { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div id="quiz-app">
    <div id="intro">
        <h1>AI Teacher Persona Quiz</h1>
        <p class="intro-text">Discover how you leverage AI to enhance teaching and learning in your classroom.</p>
        <div style="text-align: center;"><button class="restart" onclick="startQuiz()">Begin Journey</button></div>
    </div>

    <div id="quiz" class="hidden">
        <div class="progress" id="progress">Question 1 of 6</div>
        <div class="question-text" id="question"></div>
        <div class="options" id="options"></div>
    </div>

    <div id="result" class="hidden">
        <div class="result-card">
            <span class="results-header">AI Teacher Persona Results</span>
            <div id="persona-visual-container">
                <div id="img-loader" class="img-status">Generating your visual...</div>
                <img id="persona-img" src="" alt="Persona Visual" class="persona-img">
            </div>
            <h2 style="margin-bottom: 4px; font-weight: 500; color: var(--text-light);">You are the</h2>
            <div class="persona-title" id="persona-display"></div>
            <p id="persona-desc" style="font-size: 1.125rem; color: var(--text-light); text-align: center; margin-bottom: 32px; max-width: 600px; margin-left: auto; margin-right: auto;"></p>
            
            <div class="superpower">
                <strong>Your Superpower</strong>
                <span id="persona-superpower"></span>
            </div>

            <h3>How you lead with AI</h3>
            <ul class="use-case-list" id="persona-use-cases"></ul>
            
            <button class="restart" onclick="location.reload()">Take the Quiz Again</button>
        </div>

        <div class="summary-section">
            <h3>Your Response Summary</h3>
            <div id="summary-content"></div>
        </div>
    </div>
</div>

<script>
    const quizData = [
        {
            q: "When you first start planning a lesson using AI, what do you usually do?",
            options: [
                { text: "I start by crafting a good prompt to help AI generate ideas for my lesson.", persona: "Prompt Whisperer" },
                { text: "I ask AI to generate worksheets, examples, or teaching materials for the topic.", persona: "Content Alchemist" },
                { text: "I think about how students themselves could interact with AI during the lesson.", persona: "Classroom Conductor" },
                { text: "I look at past student mistakes and ask AI how I could address those misconceptions.", persona: "Feedback Detective" },
                { text: "I reflect on how my previous lesson went and ask AI how it could be improved.", persona: "Lesson Hacker" }
            ]
        },
        {
            q: "You discover a new AI tool designed for education. What is the first thing you want to try?",
            options: [
                { text: "Experiment with different prompts to see what kind of responses the AI gives.", persona: "Prompt Whisperer" },
                { text: "Use it to quickly generate resources like quizzes or case studies.", persona: "Content Alchemist" },
                { text: "Design an activity where students can use the AI to explore ideas.", persona: "Classroom Conductor" },
                { text: "See whether it can help analyse student responses or give feedback.", persona: "Feedback Detective" },
                { text: "Ask it how it could help improve or redesign one of my existing lessons.", persona: "Lesson Hacker" }
            ]
        },
        {
            q: "During a lesson, students seem stuck on a difficult concept. How might AI help?",
            options: [
                { text: "I quickly prompt AI to generate a clearer explanation or example.", persona: "Prompt Whisperer" },
                { text: "I ask AI to produce a quick practice question or example for students.", persona: "Content Alchemist" },
                { text: "I let students ask the AI questions to help them explore the concept further.", persona: "Classroom Conductor" },
                { text: "I ask AI to help identify the misconception students might have.", persona: "Feedback Detective" },
                { text: "I make a mental note and later use AI to rethink how I teach this concept next time.", persona: "Lesson Hacker" }
            ]
        },
        {
            q: "After students submit their work, how are you most likely to use AI?",
            options: [
                { text: "I ask AI how I could better phrase the instructions or prompts next time.", persona: "Prompt Whisperer" },
                { text: "I use AI to help generate additional practice questions for students.", persona: "Content Alchemist" },
                { text: "I design a follow-up activity where students can discuss their answers with AI.", persona: "Classroom Conductor" },
                { text: "I use AI to help analyse patterns in student responses and identify misconceptions.", persona: "Feedback Detective" },
                { text: "I use AI to reflect on the lesson and think about improvements for the next round.", persona: "Lesson Hacker" }
            ]
        },
        {
            q: "When colleagues talk about using AI in teaching, which idea excites you most?",
            options: [
                { text: "Learning how to write better prompts to get more useful responses.", persona: "Prompt Whisperer" },
                { text: "Using AI to create high-quality teaching materials quickly.", persona: "Content Alchemist" },
                { text: "Finding ways for students to use AI to support their own learning.", persona: "Classroom Conductor" },
                { text: "Using AI to better understand student learning and give feedback.", persona: "Feedback Detective" },
                { text: "Using AI to help refine and improve lesson design over time.", persona: "Lesson Hacker" }
            ]
        },
        {
            q: "If you had 10 minutes to experiment with AI before your next lesson, what would you most likely do?",
            options: [
                { text: "Try different prompts to see which ones produce the best teaching ideas.", persona: "Prompt Whisperer" },
                { text: "Generate a worksheet, example set, or activity for the lesson.", persona: "Content Alchemist" },
                { text: "Create a short activity where students can explore a topic with AI.", persona: "Classroom Conductor" },
                { text: "Analyse sample student answers with AI to identify misconceptions.", persona: "Feedback Detective" },
                { text: "Ask AI to review my lesson plan and suggest improvements.", persona: "Lesson Hacker" }
            ]
        }
    ];

    const personaDetails = {
        "Prompt Whisperer": {
            image: "the_prompt_whisperer.jpg",
            desc: "You know that good AI output often starts with a good prompt. You use AI as a thinking partner to brainstorm, refine explanations, and sharpen lesson ideas before teaching begins.",
            superpower: "Turning simple prompts into powerful teaching ideas.",
            useCases: ["Brainstorming lesson directions", "Refining explanations", "Generating question stems", "Exploring framing options"]
        },
        "Content Alchemist": {
            image: "the_content_alchemist.jpg",
            desc: "You turn ideas into engaging and ready-to-use learning materials. You use AI to generate worksheets, examples, and tasks that help bring content to life.",
            superpower: "Transforming ideas into practical, classroom-ready resources.",
            useCases: ["Creating worksheets", "Generating examples", "Adapting materials", "Designing tasks"]
        },
        "Classroom Conductor": {
            image: "the_classroom_conductor.jpg",
            desc: "You bring AI into the learning experience itself. You design opportunities for students to interact with AI, explore ideas, and construct understanding.",
            superpower: "Orchestrating meaningful learning experiences with AI.",
            useCases: ["Supporting student inquiry", "Designing AI activities", "Facilitating discussions", "Encouraging reflection"]
        },
        "Feedback Detective": {
            image: "the_feedback_detective.jpg",
            desc: "You use AI to uncover insights about student learning. You look for patterns, identify misconceptions, and use AI to support targeted feedback.",
            superpower: "Turning student responses into actionable learning insights.",
            useCases: ["Analysing student work", "Identifying misconceptions", "Supporting feedback", "Informing instructions"]
        },
        "Lesson Hacker": {
            image: "the_lesson_hacker.jpg",
            desc: "You are constantly refining and improving your teaching. You use AI to reflect on lessons, redesign activities, and explore better ways to support learning.",
            superpower: "Continuously improving teaching through iteration.",
            useCases: ["Reviewing effectiveness", "Improving explanations", "Redesigning activities", "Exploring approaches"]
        }
    };

    let currentQuestion = 0;
    let scores = {};
    let userAnswers = [];

    function startQuiz() {
        document.getElementById('intro').classList.add('hidden');
        document.getElementById('quiz').classList.remove('hidden');
        showQuestion();
    }

    function showQuestion() {
        const q = quizData[currentQuestion];
        document.getElementById('progress').innerText = `Question ${currentQuestion + 1} of ${quizData.length}`;
        document.getElementById('question').innerText = q.q;
        const optionsDiv = document.getElementById('options');
        optionsDiv.innerHTML = '';
        q.options.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opt.text;
            btn.onclick = () => handleAnswer(opt.persona, opt.text);
            optionsDiv.appendChild(btn);
        });
    }

    function handleAnswer(persona, text) {
        scores[persona] = (scores[persona] || 0) + 1;
        userAnswers.push({ q: quizData[currentQuestion].q, a: text });
        currentQuestion++;
        if (currentQuestion < quizData.length) {
            showQuestion();
        } else {
            showResult();
        }
    }

    function showResult() {
        document.getElementById('quiz').classList.add('hidden');
        document.getElementById('result').classList.remove('hidden');
        
        const winner = Object.keys(scores).sort((a, b) => scores[b] - scores[a])[0];
        const details = personaDetails[winner];

        const imgElement = document.getElementById('persona-img');
        const imgLoader = document.getElementById('img-loader');

        imgElement.style.display = 'none';
        imgLoader.style.display = 'block';

        const baseName = details.image;
        const variations = [baseName, "./" + baseName];

        let attemptIndex = 0;
        function attemptLoad() {
            if (attemptIndex >= variations.length) {
                imgLoader.innerHTML = `<span style="color:#ef4444; font-weight: bold;">Image Not Found: ${baseName}</span>`;
                return;
            }
            imgElement.src = variations[attemptIndex];
            attemptIndex++;
        }

        imgElement.onload = () => {
            imgLoader.style.display = 'none';
            imgElement.style.display = 'block';
            imgElement.style.opacity = '1';
        };

        imgElement.onerror = attemptLoad;
        attemptLoad();

        document.getElementById('persona-display').innerText = winner;
        document.getElementById('persona-desc').innerText = details.desc;
        document.getElementById('persona-superpower').innerText = details.superpower;

        const useCasesUl = document.getElementById('persona-use-cases');
        useCasesUl.innerHTML = '';
        details.useCases.forEach(uc => {
            const li = document.createElement('li');
            li.innerText = uc;
            useCasesUl.appendChild(li);
        });

        const summaryDiv = document.getElementById('summary-content');
        summaryDiv.innerHTML = '';
        userAnswers.forEach((ans, index) => {
            const item = document.createElement('div');
            item.className = 'summary-item';
            item.innerHTML = `<span class="summary-q">Q${index+1}: ${ans.q}</span><span class="summary-a">Choice: ${ans.a}</span>`;
            summaryDiv.appendChild(item);
        });
        
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }
</script>
</body>
</html>
