<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Teacher Persona Quiz</title>
    <!-- Professional Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&family=Poppins:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            /* Pale purple background code: #f5f3ff */
            --bg: #f5f3ff; 
            --card: #ffffff;A
            --text: #1e1b4b;
            --text-light: #6366f1;
            --accent: #eef2ff;
            --border: #e0e7ff;
            --success: #10b981;
        }
        
        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            display: flex; 
            justify-content: center; 
            padding: 20px; 
            line-height: 1.6;
            min-height: 100vh;
            margin: 0;
        }

        /* Fixed Header Logos */
        .header-logos {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 40px;
            z-index: 100;
            background: rgba(245, 243, 255, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
        }

        .header-logos img {
            height: 66px; 
            width: auto;
            max-width: 216px; 
            object-fit: contain;
        }

        #quiz-app { 
            background: var(--card); 
            max-width: 720px; 
            width: 100%; 
            padding: 60px 48px; 
            border-radius: 32px; 
            box-shadow: 0 25px 50px -12px rgba(99, 102, 241, 0.1); 
            margin-top: 110px; 
            margin-bottom: 50px;
            border: 1px solid var(--border);
            position: relative;
        }

        .hidden { display: none !important; }

        h1 { 
            font-family: 'Poppins', sans-serif;
            font-size: 2.475rem; 
            margin-bottom: 16px; 
            color: var(--text); 
            text-align: center; 
            font-weight: 900; 
            line-height: 1.1;
        }
        
        .intro-text { text-align: center; font-size: 1.2rem; color: #4338ca; margin-bottom: 40px; font-weight: 500; }

        /* Event Info Landing Page */
        .event-info {
            margin-top: 50px;
            padding-top: 40px;
            border-top: 2px solid var(--border);
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .event-title-img {
            max-width: 62%; 
            height: auto;
            margin-bottom: 25px;
            border-radius: 12px;
        }

        .event-meta {
            font-weight: 800;
            color: var(--text-light);
            font-size: 1.35rem; 
            letter-spacing: -0.01em;
            line-height: 1.3;
        }

        /* Quiz UI */
        .progress { 
            font-size: 0.85rem; 
            color: var(--primary); 
            text-align: center; 
            font-weight: 800; 
            text-transform: uppercase; 
            background: var(--accent);
            padding: 6px 18px;
            border-radius: 50px;
            width: fit-content;
            margin: 0 auto 30px auto;
            letter-spacing: 1px;
        }

        .question-text { font-size: 1.8rem; font-weight: 700; margin-bottom: 40px; text-align: center; line-height: 1.3; }
        .options { display: flex; flex-direction: column; gap: 14px; }
        .option-btn { 
            background: #fff; 
            border: 2px solid var(--border); 
            padding: 22px 30px; 
            border-radius: 18px; 
            cursor: pointer; 
            text-align: left; 
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); 
            font-size: 1.1rem;
            font-weight: 500;
            color: var(--text);
        }
        .option-btn:hover { border-color: var(--primary); background: #f5f3ff; transform: translateX(8px); }

        /* RESULTS HEADER */
        .results-header-text {
            text-align: center;
            text-transform: uppercase;
            font-family: 'Poppins', sans-serif;
            font-weight: 900;
            color: var(--primary);
            letter-spacing: 8px;
            margin-bottom: 25px;
            font-size: 2.5rem;
            line-height: 1;
            opacity: 0.9;
        }

        #persona-visual-container { 
            width: 100%; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            margin: 0 auto 32px auto; 
            background: #fafaff; 
            padding: 24px; 
            border-radius: 24px;
            border: 2px solid var(--border);
            min-height: 380px;
            position: relative;
            box-sizing: border-box;
            text-align: center;
        }

        .persona-img { 
            display: none; 
            max-width: 100%; 
            height: auto; 
            max-height: 400px;
            border-radius: 12px; 
            object-fit: contain;
            margin: 0 auto;
        }

        .persona-title { font-size: 3rem; text-align: center; font-weight: 900; margin-bottom: 12px; font-family: 'Poppins', sans-serif; color: var(--text); line-height: 1.1; }

        .superpower { 
            background: linear-gradient(135deg, #f5f3ff 0%, #e0e7ff 100%); 
            padding: 30px; 
            margin: 35px 0; 
            border-radius: 20px; 
            border: 1px solid var(--border);
            text-align: center;
        }

        .use-case-list { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 0; list-style: none; margin-bottom: 40px; }
        .use-case-list li { 
            background: #f5f3ff; 
            padding: 16px; 
            border-radius: 16px; 
            font-weight: 600; 
            font-size: 1rem;
            display: flex;
            align-items: center;
        }
        .use-case-list li::before { content: "✓"; color: var(--success); margin-right: 12px; font-weight: 900; }

        /* Review Summary Styles */
        .review-section { margin-top: 40px; border-top: 2px solid var(--border); padding-top: 30px; }
        .review-item { margin-bottom: 20px; text-align: left; background: #fafaff; padding: 15px; border-radius: 12px; border-left: 4px solid var(--primary); }
        .review-q { font-weight: 700; color: var(--text); font-size: 0.95rem; margin-bottom: 5px; }
        .review-a { color: var(--text-light); font-size: 0.9rem; font-style: italic; }

        button.action-btn { 
            background: var(--primary); 
            color: white; 
            border: none; 
            padding: 24px; 
            border-radius: 20px; 
            cursor: pointer; 
            font-weight: 800; 
            width: 100%; 
            font-size: 1.3rem;
            transition: all 0.3s ease;
            box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.3);
        }
        button.action-btn:hover { background: var(--primary-dark); transform: translateY(-4px); box-shadow: 0 20px 25px -5px rgba(99, 102, 241, 0.4); }

        @media (max-width: 600px) {
            #quiz-app { padding: 30px 20px; }
            .results-header-text { font-size: 1.8rem; letter-spacing: 4px; }
            .persona-title { font-size: 2.2rem; }
            .use-case-list { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="header-logos">
    <img src="./ed_ex_logo.png" alt="Logo" onerror="this.style.display='none'">
    <img src="./etd_new.png" alt="ETD Logo" onerror="this.style.display='none'">
</div>

<div id="quiz-app">
    <!-- Landing Page -->
    <div id="intro">
        <h1>AI Teacher Persona Quiz</h1>
        <p class="intro-text">Identify your unique approach to integrating AI in education.</p>
        
        <button class="action-btn" onclick="startQuiz()">Begin the Quiz</button>

        <div class="event-info">
            <img src="./event_title_new.png" alt="Event Title" class="event-title-img" onerror="this.style.display='none'">
            <div class="event-meta">
                22 April 2026<br>
                03:00 PM - 05:30 PM
            </div>
        </div>
    </div>

    <!-- Quiz Flow -->
    <div id="quiz" class="hidden">
        <div class="progress" id="progress">Question 1 of 6</div>
        <div class="question-text" id="question"></div>
        <div class="options" id="options"></div>
    </div>

    <!-- Results Page -->
    <div id="result" class="hidden">
        <div class="results-header-text">RESULTS</div>
        
        <div id="persona-visual-container">
            <div id="img-loader" style="color: var(--primary); font-weight: 700;">Finalizing your results...</div>
            <img id="persona-img" src="" alt="Persona Portrait" class="persona-img">
        </div>

        <h2 style="text-align:center; margin:0; font-weight:500; color: var(--text-light); letter-spacing: 1px;">You are the</h2>
        <div class="persona-title" id="persona-display"></div>
        <p id="persona-desc" style="text-align:center; color: var(--text); margin-bottom:30px; font-size: 1.2rem; max-width: 600px; margin-left: auto; margin-right: auto;"></p>
        
        <div class="superpower">
            <strong style="display:block; font-size:0.9rem; text-transform:uppercase; color:var(--primary); margin-bottom:10px; letter-spacing: 2px;">Core Superpower</strong>
            <span id="persona-superpower" style="font-size: 1.4rem; font-weight: 800; color: var(--text);"></span>
        </div>

        <h3 style="border-bottom: 2px solid var(--border); padding-bottom:12px; margin-bottom:24px; text-align: center; font-weight: 800;">Recommended AI Use Cases</h3>
        <ul class="use-case-list" id="persona-use-cases"></ul>

        <!-- Review Section (Summary of selections) -->
        <div class="review-section">
            <h3 style="text-align: center; font-weight: 800; margin-bottom: 20px;">Your Selections Review</h3>
            <div id="review-summary"></div>
        </div>
        
        <button class="action-btn" style="margin-top:50px;" onclick="location.reload()">Take the Quiz Again</button>
    </div>
</div>

<script>
    const quizData = [
        {
            q: "When you start planning a lesson using AI, what do you usually do?",
            options: [
                { text: "I start by crafting a good prompt to help AI generate ideas for my lesson.", persona: "Prompt Whisperer" },
                { text: "I ask AI to generate worksheets, examples, or teaching materials for the topic.", persona: "Content Alchemist" },
                { text: "I think about how students themselves could interact with AI during the lesson.", persona: "Classroom Conductor" },
                { text: "I look at past student mistakes and ask AI how I could address those misconceptions.", persona: "Feedback Detective" },
                { text: "I reflect on how my previous lesson went and ask AI how it could be improved.", persona: "Lesson Hacker" }
            ]
        },
        {
            q: "You discover a new AI tool designed for education. What is the first thing you want to try?",
            options: [
                { text: "Experiment with different prompts to see what kind of responses the AI gives.", persona: "Prompt Whisperer" },
                { text: "Use it to quickly generate resources like quizzes or case studies.", persona: "Content Alchemist" },
                { text: "Design an activity where students can use the AI to explore ideas.", persona: "Classroom Conductor" },
                { text: "See whether it can help analyse student responses or give feedback.", persona: "Feedback Detective" },
                { text: "Ask it to help improve or redesign one of my existing lessons.", persona: "Lesson Hacker" }
            ]
        },
        {
            q: "During a lesson, students seem stuck on a difficult concept. How might AI help?",
            options: [
                { text: "I try different prompts to see if AI can come up with a clearer explanation.", persona: "Prompt Whisperer" },
                { text: "I ask AI to produce a quick practice question or example explainer media for students.", persona: "Content Alchemist" },
                { text: "I let students ask the AI questions to help them explore the concept further.", persona: "Classroom Conductor" },
                { text: "I ask AI to help identify the misconception students might have based on their responses.", persona: "Feedback Detective" },
                { text: "I make a mental note and later use AI to redesign my lesson to teach this concept again.", persona: "Lesson Hacker" }
            ]
        },
        {
            q: "After students submit their work, how are you most likely to use AI?",
            options: [
                { text: "I prompt AI to ask what I can do with my students’ work to give them better feedback.", persona: "Prompt Whisperer" },
                { text: "I use AI to help generate additional practice questions for students.", persona: "Content Alchemist" },
                { text: "I design a follow-up activity where students can discuss their answers with AI.", persona: "Classroom Conductor" },
                { text: "I use AI to help analyse patterns in student responses and identify misconceptions.", persona: "Feedback Detective" },
                { text: "I use AI to reflect on the lesson and think about improvements for the next round.", persona: "Lesson Hacker" }
            ]
        },
        {
            q: "When colleagues talk about using AI in teaching, which idea excites you most?",
            options: [
                { text: "Learning how to write better prompts to get more useful responses.", persona: "Prompt Whisperer" },
                { text: "Using AI to create high-quality teaching materials quickly.", persona: "Content Alchemist" },
                { text: "Finding ways for students to use AI to support their own learning.", persona: "Classroom Conductor" },
                { text: "Using AI to better understand student learning and give feedback.", persona: "Feedback Detective" },
                { text: "Using AI to help refine and improve lesson design over time.", persona: "Lesson Hacker" }
            ]
        },
        {
            q: "If you had 10 minutes to experiment with AI before your next lesson, what would you most likely do?",
            options: [
                { text: "Try different prompts to see which ones produce the best teaching ideas.", persona: "Prompt Whisperer" },
                { text: "Generate a worksheet, example set, or activity for the lesson.", persona: "Content Alchemist" },
                { text: "Create a short activity where students can explore a topic with AI.", persona: "Classroom Conductor" },
                { text: "Analyse sample student answers with AI to identify misconceptions.", persona: "Feedback Detective" },
                { text: "Ask AI to review my lesson plan and suggest improvements.", persona: "Lesson Hacker" }
            ]
        }
    ];

    const personaDetails = {
        "Prompt Whisperer": {
            image: "the_prompt_whisperer.jpg",
            desc: "You know that good AI output starts with a good prompt. You use AI as a thinking partner to brainstorm and sharpen ideas.",
            superpower: "Precision Ideation & Scaffolding",
            useCases: ["Refining explanations", "Brainstorming starters", "Question stems", "Drafting content"]
        },
        "Content Alchemist": {
            image: "the_content_alchemist.jpg",
            desc: "You turn ideas into ready-to-use materials. You use AI to generate worksheets, examples, and tasks that bring content to life.",
            superpower: "Resource Transmutation",
            useCases: ["Worksheet generation", "Explainer media", "Adapting text levels", "Resource design"]
        },
        "Classroom Conductor": {
            image: "the_classroom_conductor.jpg",
            desc: "You bring AI into the student experience. You design opportunities for students to interact with AI directly.",
            superpower: "Guided Inquiry Facilitation",
            useCases: ["Student inquiries", "AI debates", "Interactive tutoring", "Concept exploration"]
        },
        "Feedback Detective": {
            image: "the_feedback_detective.jpg",
            desc: "You use AI to uncover insights about student learning. You look for patterns and identify misconceptions.",
            superpower: "Analytical Diagnostic Insight",
            useCases: ["Misconception mapping", "Exit ticket analysis", "Grouping students", "Personalised feedback"]
        },
        "Lesson Hacker": {
            image: "the_lesson_hacker.jpg",
            desc: "You are constantly refining your practice. You use AI to reflect on lessons and iterate on your design.",
            superpower: "Agile Pedagogical Iteration",
            useCases: ["Lesson redesign", "Reflection support", "Concept redesign", "Strategy auditing"]
        }
    };

    let currentQuestion = 0;
    let scores = {};
    let userSelections = [];

    function startQuiz() {
        document.getElementById('intro').classList.add('hidden');
        document.getElementById('quiz').classList.remove('hidden');
        showQuestion();
    }

    function showQuestion() {
        const q = quizData[currentQuestion];
        document.getElementById('progress').innerText = `Question ${currentQuestion + 1} of ${quizData.length}`;
        document.getElementById('question').innerText = q.q;
        const optionsDiv = document.getElementById('options');
        optionsDiv.innerHTML = '';
        q.options.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opt.text;
            btn.onclick = () => handleAnswer(opt.persona, opt.text, q.q);
            optionsDiv.appendChild(btn);
        });
    }

    function handleAnswer(persona, text, question) {
        scores[persona] = (scores[persona] || 0) + 1;
        userSelections.push({ question, answer: text });
        currentQuestion++;
        if (currentQuestion < quizData.length) {
            showQuestion();
        } else {
            showResult();
        }
    }

    function showResult() {
        document.getElementById('quiz').classList.add('hidden');
        document.getElementById('result').classList.remove('hidden');
        
        const winner = Object.keys(scores).reduce((a, b) => scores[a] > scores[b] ? a : b);
        const details = personaDetails[winner];

        const imgElement = document.getElementById('persona-img');
        const loader = document.getElementById('img-loader');
        
        imgElement.src = "./" + details.image;
        imgElement.onload = () => {
            loader.style.display = 'none';
            imgElement.style.display = 'block';
        };
        imgElement.onerror = () => {
            loader.innerHTML = `<span style="font-size: 1.5rem; font-weight:800; color:var(--primary);">${winner}</span>`;
        };

        document.getElementById('persona-display').innerText = winner;
        document.getElementById('persona-desc').innerText = details.desc;
        document.getElementById('persona-superpower').innerText = details.superpower;

        const useCasesUl = document.getElementById('persona-use-cases');
        useCasesUl.innerHTML = '';
        details.useCases.forEach(uc => {
            const li = document.createElement('li');
            li.innerText = uc;
            useCasesUl.appendChild(li);
        });

        // Build Review Summary
        const reviewSummary = document.getElementById('review-summary');
        reviewSummary.innerHTML = '';
        userSelections.forEach(item => {
            const div = document.createElement('div');
            div.className = 'review-item';
            div.innerHTML = `
                <div class="review-q">${item.question}</div>
                <div class="review-a">You selected: ${item.answer}</div>
            `;
            reviewSummary.appendChild(div);
        });
        
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }
</script>
</body>
</html>
