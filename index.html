<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Teacher Persona Quiz</title>
    <!-- Professional Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&family=Poppins:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --bg: #f5f3ff; 
            --card: #ffffff;
            --text: #1e1b4b;
            --text-light: #6366f1;
            --accent: #eef2ff;
            --border: #e0e7ff;
            --success: #10b981;
        }
        
        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            display: flex; 
            justify-content: center; 
            padding: 20px; 
            line-height: 1.6;
            min-height: 100vh;
            margin: 0;
        }

        /* Fixed Header Logos */
        .header-logos {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            z-index: 100;
            background: rgba(245, 243, 255, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
        }

        .header-logos img {
            height: 72px; 
            width: auto;
            max-width: 220px; 
            object-fit: contain;
        }

        #quiz-app { 
            background: var(--card); 
            max-width: 720px; 
            width: 100%; 
            padding: 40px 30px; 
            border-radius: 32px; 
            box-shadow: 0 25px 50px -12px rgba(99, 102, 241, 0.1); 
            margin-top: 120px; 
            margin-bottom: 50px;
            border: 1px solid var(--border);
            position: relative;
        }

        .hidden { display: none !important; }

        h1 { 
            font-family: 'Poppins', sans-serif;
            font-size: 2.2rem; 
            margin-bottom: 16px; 
            color: var(--text); 
            text-align: center; 
            font-weight: 900; 
            line-height: 1.1;
        }
        
        .intro-text { text-align: center; font-size: 1.1rem; color: #4338ca; margin-bottom: 30px; font-weight: 500; }

        .event-info {
            margin-top: 40px;
            padding-top: 30px;
            border-top: 2px solid var(--border);
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .event-title-img {
            max-width: 51%; 
            height: auto;
            margin-bottom: 20px;
            border-radius: 12px;
        }

        .event-meta {
            font-weight: 800;
            color: var(--text-light);
            font-size: 1.2rem; 
            letter-spacing: -0.01em;
            line-height: 1.3;
        }

        .progress { 
            font-size: 0.8rem; 
            color: var(--primary); 
            text-align: center; 
            font-weight: 800; 
            text-transform: uppercase; 
            background: var(--accent);
            padding: 6px 16px;
            border-radius: 50px;
            width: fit-content;
            margin: 0 auto 25px auto;
            letter-spacing: 1px;
        }

        .question-text { font-size: 1.6rem; font-weight: 700; margin-bottom: 30px; text-align: center; line-height: 1.3; }
        .options { display: flex; flex-direction: column; gap: 12px; }
        .option-btn { 
            background: #fff; 
            border: 2px solid var(--border); 
            padding: 18px 24px; 
            border-radius: 16px; 
            cursor: pointer; 
            text-align: left; 
            transition: all 0.2s ease; 
            font-size: 1rem;
            font-weight: 500;
            color: var(--text);
        }
        .option-btn:hover { border-color: var(--primary); background: #f5f3ff; transform: translateX(5px); }

        .results-header-text {
            text-align: center;
            text-transform: uppercase;
            font-family: 'Poppins', sans-serif;
            font-weight: 900;
            color: var(--primary);
            letter-spacing: 6px;
            margin-bottom: 20px;
            font-size: 2rem;
            line-height: 1;
        }

        #persona-visual-container { 
            width: 100%; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            margin: 0 auto 25px auto; 
            background: #fafaff; 
            padding: 20px; 
            border-radius: 24px;
            border: 2px solid var(--border);
            min-height: 300px;
            position: relative;
            box-sizing: border-box;
            text-align: center;
        }

        .persona-img { 
            display: none; 
            max-width: 100%; 
            height: auto; 
            max-height: 350px;
            border-radius: 12px; 
            object-fit: contain;
            margin: 0 auto;
        }

        .persona-title { font-size: 2.5rem; text-align: center; font-weight: 900; margin-bottom: 10px; font-family: 'Poppins', sans-serif; color: var(--text); line-height: 1.1; }

        .superpower { 
            background: linear-gradient(135deg, #f5f3ff 0%, #e0e7ff 100%); 
            padding: 25px; 
            margin: 30px 0; 
            border-radius: 20px; 
            border: 1px solid var(--border);
            text-align: center;
        }

        .use-case-list { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 0; list-style: none; margin-bottom: 30px; }
        .use-case-list li { 
            background: #f5f3ff; 
            padding: 14px; 
            border-radius: 14px; 
            font-weight: 600; 
            font-size: 0.95rem;
            display: flex;
            align-items: center;
        }
        .use-case-list li::before { content: "✓"; color: var(--success); margin-right: 10px; font-weight: 900; }

        .review-section { margin-top: 30px; border-top: 2px solid var(--border); padding-top: 25px; }
        .review-item { margin-bottom: 15px; text-align: left; background: #fafaff; padding: 12px; border-radius: 12px; border-left: 4px solid var(--primary); }
        .review-q { font-weight: 700; color: var(--text); font-size: 0.9rem; margin-bottom: 4px; }
        .review-a { color: var(--text-light); font-size: 0.85rem; font-style: italic; }

        button.action-btn { 
            background: var(--primary); 
            color: white; 
            border: none; 
            padding: 20px; 
            border-radius: 18px; 
            cursor: pointer; 
            font-weight: 800; 
            width: 100%; 
            font-size: 1.2rem;
            transition: all 0.3s ease;
            box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.3);
        }
        button.action-btn:hover { background: var(--primary-dark); transform: translateY(-3px); }

        @media (max-width: 600px) {
            #quiz-app { padding: 25px 15px; margin-top: 100px; }
            .header-logos { padding: 8px 15px; }
            .header-logos img { height: 58px; } 
            h1 { font-size: 1.8rem; }
            .results-header-text { font-size: 1.5rem; letter-spacing: 3px; }
            .persona-title { font-size: 2rem; }
            .use-case-list { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="header-logos">
    <img src="ed_ex_logo.png" alt="EdEx Logo" onerror="handleLogoError(this, 'EdEx')">
    <img src="etd_new.png" alt="ETD Logo" onerror="handleLogoError(this, 'ETD')">
</div>

<div id="quiz-app">
    <!-- Landing Page -->
    <div id="intro">
        <h1>AI Teacher Persona Quiz</h1>
        <p class="intro-text">Identify your unique approach to integrating AI in education.</p>
        
        <button class="action-btn" onclick="startQuiz()">Begin the Quiz</button>

        <div class="event-info">
            <img src="event_title_new.png" alt="Event Title" class="event-title-img" onerror="this.parentElement.style.display='block'; this.style.display='none';">
            <div class="event-meta">
                22 April 2026<br>
                03:00 PM - 05:30 PM
            </div>
        </div>
    </div>

    <!-- Quiz Flow -->
    <div id="quiz" class="hidden">
        <div class="progress" id="progress">Question 1 of 6</div>
        <div class="question-text" id="question"></div>
        <div class="options" id="options"></div>
    </div>

    <!-- Results Page -->
    <div id="result" class="hidden">
        <div class="results-header-text">RESULTS</div>
        
        <div id="persona-visual-container">
            <div id="img-loader" style="color: var(--primary); font-weight: 700;">Finalizing your results...</div>
            <img id="persona-img" src="" alt="Persona Portrait" class="persona-img">
        </div>

        <h2 style="text-align:center; margin:0; font-weight:500; color: var(--text-light); letter-spacing: 1px;">You are the</h2>
        <div class="persona-title" id="persona-display"></div>
        <p id="persona-desc" style="text-align:center; color: var(--text); margin-bottom:25px; font-size: 1.1rem; max-width: 600px; margin-left: auto; margin-right: auto;"></p>
        
        <div class="superpower">
            <strong style="display:block; font-size:0.85rem; text-transform:uppercase; color:var(--primary); margin-bottom:8px; letter-spacing: 2px;">Core Superpower</strong>
            <span id="persona-superpower" style="font-size: 1.3rem; font-weight: 800; color: var(--text);"></span>
        </div>

        <h3 style="border-bottom: 2px solid var(--border); padding-bottom:10px; margin-bottom:20px; text-align: center; font-weight: 800;">Typically use AI for...</h3>
        <ul class="use-case-list" id="persona-use-cases"></ul>

        <!-- Review Section -->
        <div class="review-section">
            <h3 style="text-align: center; font-weight: 800; margin-bottom: 15px;">Your Selections Review</h3>
            <div id="review-summary"></div>
        </div>
        
        <button class="action-btn" style="margin-top:40px;" onclick="location.reload()">Take the Quiz Again</button>
    </div>
</div>

<script>
    function handleLogoError(img, text) {
        const span = document.createElement('span');
        span.style.fontWeight = '800';
        span.style.color = 'var(--primary)';
        span.style.fontSize = '1.2rem';
        span.innerText = text;
        img.parentNode.replaceChild(span, img);
    }

    const quizData = [
        {
            q: "When you first start planning a lesson using AI, what do you usually do?",
            options: [
                { text: "I start by crafting a good prompt to help AI generate ideas for my lesson.", persona: "Prompt Whisperer" },
                { text: "I ask AI to generate initial drafts of worksheets, examples, or teaching materials for the topic.", persona: "Content Alchemist" },
                { text: "I think about how students themselves could interact responsibly with AI to support their learning during the lesson.", persona: "Classroom Conductor" },
                { text: "I use AI to aggregate past student mistakes and consider how I could address those misconceptions.", persona: "Feedback Detective" },
                { text: "I use AI to support me in reflecting on how my previous lesson went, then try to improve it.", persona: "Lesson Hacker" }
            ]
        },
        {
            q: "You discover a new AI tool designed for education. What is the first thing you want to try?",
            options: [
                { text: "Experiment with different prompts to see what kind of responses the AI gives and to determine if it has appropriate guardrails in place.", persona: "Prompt Whisperer" },
                { text: "Use it to generate initial drafts of resources like quizzes or case studies, then consider if they are helpful for my teaching and learning practices.", persona: "Content Alchemist" },
                { text: "Design an activity to see how it can be used to help my students explore ideas.", persona: "Classroom Conductor" },
                { text: "If it cannot be used to provide learning data, I am not using it!", persona: "Feedback Detective" },
                { text: "Can it be used for lesson review?", persona: "Lesson Hacker" }
            ]
        },
        {
            q: "During a department meeting, the team discusses the design for a level Project Work. What is your suggestion?",
            options: [
                { text: "Use the Lesson Collaborator Chatbot and the Authoring Copilot to generate different drafts for discussion.", persona: "Prompt Whisperer" },
                { text: "Use Google NotebookLM to generate multimodal resources and consider how these resources can supplement my students’ learning experiences.", persona: "Content Alchemist" },
                { text: "Consider how SLS AI tools can facilitate student collaboration rather than simply getting students to do seatwork.", persona: "Classroom Conductor" },
                { text: "Consider how AI tools can facilitate the collection of learning data throughout students’ learning processes.", persona: "Feedback Detective" },
                { text: "Consider how department teachers can use AI to collaborate in developing resources.", persona: "Lesson Hacker" }
            ]
        },
        {
            q: "After students submit their work, how do you use AI to support post-lesson learning?",
            options: [
                { text: "I refine AI-generated feedback (by constantly refining my prompts) and check that my students can understand and act on the feedback.", persona: "Prompt Whisperer" },
                { text: "I use ACP or other AI lesson planning tools to help generate additional lesson materials to address my students’ needs.", persona: "Content Alchemist" },
                { text: "I use AI to help me explore different lesson modalities that can address my students’ learning needs.", persona: "Classroom Conductor" },
                { text: "I use AI to analyse patterns in student responses and identify misconceptions.", persona: "Feedback Detective" },
                { text: "I use AI to reflect on my lesson enactment and consider how my lesson can be improved for my other classes at the same level.", persona: "Lesson Hacker" }
            ]
        },
        {
            q: "When colleagues talk about using AI in teaching, which idea excites you most?",
            options: [
                { text: "Learning how to write better prompts that can improve my lessons.", persona: "Prompt Whisperer" },
                { text: "Using AI to create high-quality teaching materials quickly.", persona: "Content Alchemist" },
                { text: "Finding ways in which AI can facilitate learning experiences that can transform students’ learning.", persona: "Classroom Conductor" },
                { text: "Using AI to better understand student learning and provide feedback.", persona: "Feedback Detective" },
                { text: "Using AI to help refine and improve lesson design over time.", persona: "Lesson Hacker" }
            ]
        },
        {
            q: "To you, what is most helpful about using AI in teaching and learning?",
            options: [
                { text: "GenAI supports my idea generation. I can try different prompts to see which ones produce the best teaching ideas.", persona: "Prompt Whisperer" },
                { text: "It is able to help me generate initial drafts of lesson resources. What more can I ask for?", persona: "Content Alchemist" },
                { text: "I am now more open to different lesson modalities and possibilities of what students might be able to do in class.", persona: "Classroom Conductor" },
                { text: "Data, data, data.", persona: "Feedback Detective" },
                { text: "I can reflect candidly on my lesson and seek feedback from my colleagues to improve my teaching and learning practices.", persona: "Lesson Hacker" }
            ]
        }
    ];

    const personaDetails = {
        "Prompt Whisperer": {
            image: "the_prompt_whisperer.jpg",
            desc: "You know that good AI output often starts with a good prompt. You use AI as a thinking partner to brainstorm, refine explanations, and sharpen lesson ideas before teaching begins.",
            superpower: "Turning simple prompts into powerful teaching ideas.",
            useCases: ["Brainstorming lesson directions", "Refining explanations and examples", "Generating strong question stems", "Exploring multiple ways to frame a concept"]
        },
        "Content Alchemist": {
            image: "the_content_alchemist.jpg",
            desc: "You turn ideas into engaging and ready-to-use learning materials. You use AI to generate drafts of worksheets, examples, and tasks that you further refine to bring content to life and make learning more accessible for your students.",
            superpower: "Transforming ideas into practical, classroom-ready resources.",
            useCases: ["Creating worksheets and practice questions", "Generating examples and case studies", "Adapting materials for different student needs", "Designing engaging learning tasks"]
        },
        "Classroom Conductor": {
            image: "the_classroom_conductor.jpg",
            desc: "You bring AI intentionally into the learning experience itself. You design opportunities for students to interact with AI responsibly, such as exploring ideas and constructing understanding, making learning more active and student-centric.",
            superpower: "Orchestrating meaningful learning experiences with AI.",
            useCases: ["Supporting student inquiry and exploration", "Designing AI-assisted classroom activities", "Facilitating discussions and idea generation", "Encouraging reflection and deeper thinking"]
        },
        "Feedback Detective": {
            image: "the_feedback_detective.jpg",
            desc: "You use AI to uncover insights about student learning. You leverage learning data and AI’s affordances to look for patterns, identify misconceptions, and support targeted feedback that helps students improve.",
            superpower: "Turning student responses into actionable learning insights.",
            useCases: ["Analysing student work and responses", "Identifying misconceptions and learning gaps", "Supporting feedback generation", "Informing next instructional steps"]
        },
        "Lesson Hacker": {
            image: "the_lesson_hacker.jpg",
            desc: "You are constantly refining and reflecting on your teaching practice. You use AI to reflect on lessons, review your lesson materials, and redesign activities to explore better ways to support student learning.",
            superpower: "Continuously improving teaching through iteration and reflection.",
            useCases: ["Reviewing lesson effectiveness", "Improving explanations and lesson flow", "Redesigning activities for better engagement", "Exploring alternative teaching approaches"]
        }
    };

    let currentQuestion = 0;
    let scores = {};
    let userSelections = [];

    function startQuiz() {
        document.getElementById('intro').classList.add('hidden');
        document.getElementById('quiz').classList.remove('hidden');
        showQuestion();
    }

    function showQuestion() {
        const q = quizData[currentQuestion];
        if (!q) return;
        
        document.getElementById('progress').innerText = `Question ${currentQuestion + 1} of ${quizData.length}`;
        document.getElementById('question').innerText = q.q;
        const optionsDiv = document.getElementById('options');
        optionsDiv.innerHTML = '';
        
        q.options.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opt.text;
            btn.onclick = () => handleAnswer(opt.persona, opt.text, q.q);
            optionsDiv.appendChild(btn);
        });
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function handleAnswer(persona, text, question) {
        scores[persona] = (scores[persona] || 0) + 1;
        userSelections.push({ question, answer: text });
        currentQuestion++;
        if (currentQuestion < quizData.length) {
            showQuestion();
        } else {
            showResult();
        }
    }

    function showResult() {
        document.getElementById('quiz').classList.add('hidden');
        document.getElementById('result').classList.remove('hidden');
        
        const winner = Object.keys(scores).reduce((a, b) => scores[a] > scores[b] ? a : b);
        const details = personaDetails[winner];

        const imgElement = document.getElementById('persona-img');
        const loader = document.getElementById('img-loader');
        
        imgElement.style.display = 'none';
        loader.style.display = 'block';

        imgElement.src = details.image;
        imgElement.onload = () => {
            loader.style.display = 'none';
            imgElement.style.display = 'block';
        };
        imgElement.onerror = () => {
            loader.innerHTML = `<span style="font-size: 1.8rem; font-weight:900; color:var(--primary); text-transform:uppercase;">${winner}</span><br><small style="color:var(--text-light)">(Image not found)</small>`;
        };

        document.getElementById('persona-display').innerText = winner;
        document.getElementById('persona-desc').innerText = details.desc;
        document.getElementById('persona-superpower').innerText = details.superpower;

        const useCasesUl = document.getElementById('persona-use-cases');
        useCasesUl.innerHTML = '';
        details.useCases.forEach(uc => {
            const li = document.createElement('li');
            li.innerText = uc;
            useCasesUl.appendChild(li);
        });

        const reviewSummary = document.getElementById('review-summary');
        reviewSummary.innerHTML = '';
        userSelections.forEach(item => {
            const div = document.createElement('div');
            div.className = 'review-item';
            div.innerHTML = `
                <div class="review-q">${item.question}</div>
                <div class="review-a">You selected: ${item.answer}</div>
            `;
            reviewSummary.appendChild(div);
        });
        
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }
</script>
</body>
</html>
