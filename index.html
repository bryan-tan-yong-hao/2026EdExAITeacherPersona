<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Teacher Persona Quiz</title>
    <!-- Professional Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&family=Poppins:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --bg: #f5f3ff; 
            --card: #ffffff;
            --text: #1e1b4b;
            --text-light: #6366f1;
            --accent: #eef2ff;
            --border: #e0e7ff;
            --success: #10b981;
        }
        
        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            display: flex; 
            justify-content: center; 
            padding: 20px; 
            line-height: 1.6;
            min-height: 100vh;
            margin: 0;
        }

        /* Fixed Header Logos */
        .header-logos {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            z-index: 100;
            background: rgba(245, 243, 255, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
        }

        .header-logos img {
            height: 60px; 
            width: auto;
            max-width: 180px; 
            object-fit: contain;
        }

        #quiz-app { 
            background: var(--card); 
            max-width: 720px; 
            width: 100%; 
            padding: 40px 30px; 
            border-radius: 32px; 
            box-shadow: 0 25px 50px -12px rgba(99, 102, 241, 0.1); 
            margin-top: 100px; 
            margin-bottom: 50px;
            border: 1px solid var(--border);
            position: relative;
        }

        .hidden { display: none !important; }

        h1 { 
            font-family: 'Poppins', sans-serif;
            font-size: 2.2rem; 
            margin-bottom: 16px; 
            color: var(--text); 
            text-align: center; 
            font-weight: 900; 
            line-height: 1.1;
        }
        
        .intro-text { text-align: center; font-size: 1.1rem; color: #4338ca; margin-bottom: 30px; font-weight: 500; }

        .event-info {
            margin-top: 40px;
            padding-top: 30px;
            border-top: 2px solid var(--border);
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .event-title-img {
            max-width: 80%; 
            height: auto;
            margin-bottom: 20px;
            border-radius: 12px;
        }

        .event-meta {
            font-weight: 800;
            color: var(--text-light);
            font-size: 1.2rem; 
            line-height: 1.3;
        }

        .progress { 
            font-size: 0.8rem; 
            color: var(--primary); 
            text-align: center; 
            font-weight: 800; 
            text-transform: uppercase; 
            background: var(--accent);
            padding: 6px 16px;
            border-radius: 50px;
            width: fit-content;
            margin: 0 auto 25px auto;
            letter-spacing: 1px;
        }

        .question-text { font-size: 1.6rem; font-weight: 700; margin-bottom: 30px; text-align: center; line-height: 1.3; }
        .options { display: flex; flex-direction: column; gap: 12px; }
        .option-btn { 
            background: #fff; 
            border: 2px solid var(--border); 
            padding: 18px 24px; 
            border-radius: 16px; 
            cursor: pointer; 
            text-align: left; 
            transition: all 0.2s ease; 
            font-size: 1rem;
            font-weight: 500;
            color: var(--text);
        }
        .option-btn:hover { border-color: var(--primary); background: #f5f3ff; transform: translateX(5px); }

        .results-header-text {
            text-align: center;
            text-transform: uppercase;
            font-family: 'Poppins', sans-serif;
            font-weight: 900;
            color: var(--primary);
            letter-spacing: 6px;
            margin-bottom: 20px;
            font-size: 2rem;
        }

        #persona-visual-container { 
            width: 100%; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            margin: 0 auto 25px auto; 
            background: #fafaff; 
            padding: 20px; 
            border-radius: 24px;
            border: 2px solid var(--border);
            min-height: 300px;
        }

        .persona-img { 
            max-width: 100%; 
            height: auto; 
            max-height: 350px;
            border-radius: 12px; 
            object-fit: contain;
        }

        .persona-title { font-size: 2.5rem; text-align: center; font-weight: 900; margin-bottom: 10px; font-family: 'Poppins', sans-serif; color: var(--text); }

        .superpower { 
            background: linear-gradient(135deg, #f5f3ff 0%, #e0e7ff 100%); 
            padding: 25px; 
            margin: 30px 0; 
            border-radius: 20px; 
            border: 1px solid var(--border);
            text-align: center;
        }

        .use-case-list { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 0; list-style: none; margin-bottom: 30px; }
        .use-case-list li { 
            background: #f5f3ff; 
            padding: 14px; 
            border-radius: 14px; 
            font-weight: 600; 
            font-size: 0.95rem;
            display: flex;
            align-items: center;
        }
        .use-case-list li::before { content: "✓"; color: var(--success); margin-right: 10px; font-weight: 900; }

        button.action-btn { 
            background: var(--primary); 
            color: white; 
            border: none; 
            padding: 20px; 
            border-radius: 18px; 
            cursor: pointer; 
            font-weight: 800; 
            width: 100%; 
            font-size: 1.2rem;
            box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.3);
        }

        @media (max-width: 600px) {
            #quiz-app { margin-top: 80px; padding: 20px; }
            .header-logos img { height: 45px; }
            .use-case-list { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="header-logos">
    <img src="ed_ex_logo.png" alt="EdEx Logo" onerror="this.src='https://via.placeholder.com/150x60?text=EdEx'">
    <img src="etd.png" alt="ETD Logo" onerror="this.src='https://via.placeholder.com/150x60?text=ETD'">
</div>

<div id="quiz-app">
    <!-- Landing Page -->
    <div id="intro">
        <h1>AI Teacher Persona Quiz</h1>
        <p class="intro-text">Discover your AI teaching profile for 2026.</p>
        <button class="action-btn" onclick="startQuiz()">Start Quiz</button>
        <div class="event-info">
            <img src="event_title.png" alt="Event Title" class="event-title-img" onerror="this.style.display='none'">
            <div class="event-meta">April 22, 2026 | 3:00 PM</div>
        </div>
    </div>

    <!-- Quiz Flow -->
    <div id="quiz" class="hidden">
        <div class="progress" id="progress">Question 1 of 6</div>
        <div class="question-text" id="question"></div>
        <div class="options" id="options"></div>
    </div>

    <!-- Results Page -->
    <div id="result" class="hidden">
        <div class="results-header-text">YOUR PERSONA</div>
        <div id="persona-visual-container">
            <img id="persona-img" src="" alt="Persona" class="persona-img">
        </div>
        <div class="persona-title" id="persona-display"></div>
        <p id="persona-desc" style="text-align:center;"></p>
        <div class="superpower"><span id="persona-superpower" style="font-weight:800;"></span></div>
        <ul class="use-case-list" id="persona-use-cases"></ul>
        <button class="action-btn" onclick="location.reload()">Restart</button>
    </div>
</div>

<script>
    const quizData = [
        {
            q: "When you start planning a lesson using AI, what do you usually do?",
            options: [
                { text: "I start by crafting a good prompt to help AI generate ideas for my lesson.", persona: "Prompt Whisperer" },
                { text: "I ask AI to generate worksheets, examples, or teaching materials for the topic.", persona: "Content Alchemist" },
                { text: "I think about how students themselves could interact with AI during the lesson.", persona: "Classroom Conductor" },
                { text: "I look at past student mistakes and ask AI how I could address those misconceptions.", persona: "Feedback Detective" },
                { text: "I reflect on how my previous lesson went and ask AI how it could be improved.", persona: "Lesson Hacker" }
            ]
        },
        {
            q: "You discover a new AI tool designed for education. What is the first thing you want to try?",
            options: [
                { text: "Experiment with different prompts to see what kind of responses the AI gives.", persona: "Prompt Whisperer" },
                { text: "Use it to quickly generate resources like quizzes or case studies.", persona: "Content Alchemist" },
                { text: "Design an activity where students can use the AI to explore ideas.", persona: "Classroom Conductor" },
                { text: "See whether it can help analyse student responses or give feedback.", persona: "Feedback Detective" },
                { text: "Ask it to help improve or redesign one of my existing lessons.", persona: "Lesson Hacker" }
            ]
        },
        {
            q: "During a lesson, students seem stuck on a difficult concept. How might AI help?",
            options: [
                { text: "I try different prompts to see if AI can come up with a clearer explanation.", persona: "Prompt Whisperer" },
                { text: "I ask AI to produce a quick practice question or example explainer media for students.", persona: "Content Alchemist" },
                { text: "I let students ask the AI questions to help them explore the concept further.", persona: "Classroom Conductor" },
                { text: "I ask AI to help identify the misconception students might have.", persona: "Feedback Detective" },
                { text: "I later use AI to redesign my lesson to teach this concept again.", persona: "Lesson Hacker" }
            ]
        },
        {
            q: "After students submit their work, how are you most likely to use AI?",
            options: [
                { text: "I prompt AI to ask what I can do with my students’ work to give them better feedback.", persona: "Prompt Whisperer" },
                { text: "I use AI to help generate additional practice questions for students.", persona: "Content Alchemist" },
                { text: "I design a follow-up activity where students can discuss their answers with AI.", persona: "Classroom Conductor" },
                { text: "I use AI to help analyse patterns in student responses.", persona: "Feedback Detective" },
                { text: "I use AI to reflect on the lesson and think about improvements.", persona: "Lesson Hacker" }
            ]
        },
        {
            q: "When colleagues talk about using AI in teaching, which idea excites you most?",
            options: [
                { text: "Learning how to write better prompts to get more useful responses.", persona: "Prompt Whisperer" },
                { text: "Using AI to create high-quality teaching materials quickly.", persona: "Content Alchemist" },
                { text: "Finding ways for students to use AI to support their own learning.", persona: "Classroom Conductor" },
                { text: "Using AI to better understand student learning and give feedback.", persona: "Feedback Detective" },
                { text: "Using AI to help refine and improve lesson design over time.", persona: "Lesson Hacker" }
            ]
        },
        {
            q: "If you had 10 minutes to experiment with AI before your next lesson, what would you most likely do?",
            options: [
                { text: "Try different prompts to see which ones produce the best teaching ideas.", persona: "Prompt Whisperer" },
                { text: "Generate a worksheet, example set, or activity for the lesson.", persona: "Content Alchemist" },
                { text: "Create a short activity where students can explore a topic with AI.", persona: "Classroom Conductor" },
                { text: "Analyse sample student answers with AI to identify misconceptions.", persona: "Feedback Detective" },
                { text: "Ask AI to review my lesson plan and suggest improvements.", persona: "Lesson Hacker" }
            ]
        }
    ];

    const personaDetails = {
        "Prompt Whisperer": {
            image: "the_prompt_whisperer.jpg",
            desc: "You know that good AI output often starts with a good prompt. You use AI as a thinking partner to brainstorm and refine ideas.",
            superpower: "Precision Prompter",
            useCases: ["Brainstorming ideas", "Refining explanations", "Drafting prompts"]
        },
        "Content Alchemist": {
            image: "the_content_alchemist.jpg",
            desc: "You turn ideas into ready-to-use materials. You use AI to generate drafts of worksheets and engaging tasks.",
            superpower: "Resource Generator",
            useCases: ["Creating worksheets", "Generating examples", "Adapting materials"]
        },
        "Classroom Conductor": {
            image: "the_classroom_conductor.jpg",
            desc: "You bring AI into the learning experience itself. You design opportunities for students to interact with AI responsibly.",
            superpower: "Activity Architect",
            useCases: ["Student inquiry", "AI-assisted activities", "Idea generation"]
        },
        "Feedback Detective": {
            image: "the_feedback_detective.jpg",
            desc: "You use AI to uncover insights about student learning. You leverage AI to look for patterns and identify gaps.",
            superpower: "Insight Analyst",
            useCases: ["Analysing work", "Identifying gaps", "Feedback support"]
        },
        "Lesson Hacker": {
            image: "the_lesson_hacker.jpg",
            desc: "You are constantly refining your teaching practice. You use AI to reflect on lessons and iterate on designs.",
            superpower: "Iterative Designer",
            useCases: ["Lesson reflection", "Design improvement", "Strategy review"]
        }
    };

    let currentQuestion = 0;
    let scores = {};

    function startQuiz() {
        document.getElementById('intro').classList.add('hidden');
        document.getElementById('quiz').classList.remove('hidden');
        showQuestion();
    }

    function showQuestion() {
        const q = quizData[currentQuestion];
        document.getElementById('progress').innerText = `Question ${currentQuestion + 1} of 6`;
        document.getElementById('question').innerText = q.q;
        const opts = document.getElementById('options');
        opts.innerHTML = '';
        q.options.forEach(opt => {
            const b = document.createElement('button');
            b.className = 'option-btn';
            b.innerText = opt.text;
            b.onclick = () => {
                scores[opt.persona] = (scores[opt.persona] || 0) + 1;
                currentQuestion++;
                if (currentQuestion < quizData.length) showQuestion();
                else showResult();
            };
            opts.appendChild(b);
        });
    }

    function showResult() {
        document.getElementById('quiz').classList.add('hidden');
        document.getElementById('result').classList.remove('hidden');
        const winner = Object.keys(scores).reduce((a, b) => scores[a] > scores[b] ? a : b);
        const d = personaDetails[winner];
        
        const img = document.getElementById('persona-img');
        img.src = d.image;
        img.onerror = () => img.src = `https://via.placeholder.com/400x300/6366f1/ffffff?text=${winner}`;
        
        document.getElementById('persona-display').innerText = winner;
        document.getElementById('persona-desc').innerText = d.desc;
        document.getElementById('persona-superpower').innerText = d.superpower;
        const uc = document.getElementById('persona-use-cases');
        uc.innerHTML = '';
        d.useCases.forEach(text => {
            const li = document.createElement('li');
            li.innerText = text;
            uc.appendChild(li);
        });
    }
</script>
</body>
</html>
